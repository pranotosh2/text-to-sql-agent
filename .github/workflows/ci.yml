name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run tests ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: northwind
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Load Northwind schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d northwind -f backend/northwind.sql

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/northwind
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd backend
          pytest tests/ -v

  # ── Job 2: Build & push Docker image ─────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .                          # Fixed: Root context allows COPY backend/ to work
          file: Dockerfile.backend  # Points directly to the file inside backend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/text-to-sql-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .                          # Fixed: Keeps alignment with root layout
          file: Dockerfile.frontend # Points directly to the file inside frontend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/text-to-sql-frontend:latest

  # ── Job 3: Deploy to Render ───────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy (backend)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

      - name: Trigger Render deploy (frontend)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
